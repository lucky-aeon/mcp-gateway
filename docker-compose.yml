services:
  mongodb:
    image: mongo
    container_name: mcp-gateway-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mcp_gateway
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-gateway
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/mcp_gateway
    volumes:
      - ./vm:/etc/proxy/vm
      - ./mcp_servers.json:/etc/proxy/mcp_servers.json
      - ./config.json:/etc/proxy/config.json
    depends_on:
      - mongodb
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mcp-gateway-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - mcp-gateway
    restart: unless-stopped

volumes:
  mongodb_data:
